worker_processes 1;

pid         /tmp/nginx.pid;
error_log   /dev/stdout info;

events {
 worker_connections 768;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log /dev/stdout;

    server{
        root        /usr/share/nginx/html;
        listen      8090;
        server_name launchpad-ui;
        include /etc/nginx/mime.types;
        
        # Main index.html and SPA fallback - never cache
        location / {
            try_files $uri /index.html;
        }
        
        # Never cache index.html to ensure users get latest version
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            try_files $uri =404;
        }
        
        # Never cache env.js (runtime config)
        location = /env.js {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            try_files $uri =404;
        }
        
        # Never cache other environment config files
        location ~* \.(dev|tst|prd)\.js$ {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            try_files $uri =404;
        }
        
        # Long-term cache for hashed assets (JS, CSS, images, fonts, etc.)
        location ~* ^/assets/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            add_header Cache-Control "public, max-age=31536000, immutable, stale-while-revalidate=86400" always;
            try_files $uri =404;
        }
        
        # Medium-term cache for other static assets in public folder
        location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|json|txt)$ {
            add_header Cache-Control "public, max-age=86400" always;
            try_files $uri =404;
        }
        
        location /metrics {
            stub_status;
            access_log off;
            default_type text/plain;
            return 200 "# TYPE nginx_connections_active gauge
# HELP nginx_connections_active Active client connections
nginx_connections_active $connections_active
# TYPE nginx_connections_waiting gauge
# HELP nginx_connections_waiting Idle client connections
nginx_connections_waiting $connections_waiting
# TYPE nginx_connections_writing gauge
# HELP nginx_connections_writing Connections where NGINX is writing the response back to the client
nginx_connections_writing $connections_writing
# TYPE nginx_connections_reading gauge
# HELP nginx_connections_reading Connections where NGINX is reading the request header
nginx_connections_reading $connections_reading";
        }
    }
}